<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password - Parent Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/parent-portal.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, var(--school-primary-dark, #1e293b) 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: #f1f5f9;
            color: #0f172a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 24px;
        }

        h2 { color: #0f172a; margin: 0 0 10px; font-weight: 800; }
        p { color: #64748b; font-size: 0.95rem; margin-bottom: 30px; }

        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.85rem; color: var(--school-primary-dark, #1e293b); }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            background: #f8fafc;
        }
        input:focus { border-color: #0f172a; background: white; }

        .btn-update {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-update:hover { background: var(--school-primary-dark, #1e293b); transform: translateY(-1px); }
    </style>
</head>

<body>
    <div class="auth-card">
        <div class="icon-box">
            <i class="fas fa-user-lock"></i>
        </div>
        <h2>Security Update</h2>
        <p>A password reset was requested for your account. Please set a new secure portal password to continue.</p>

        <form id="updateForm">
            <div class="form-group">
                <label>New Portal Password</label>
                <input type="password" id="newPassword" required placeholder="Minimum 6 characters">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" required placeholder="Re-enter password">
            </div>
            <button type="submit" class="btn-update">Update Password & Login</button>
        </form>
    </div>

    <script>
        document.getElementById('updateForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const pass = document.getElementById('newPassword').value;
            const conf = document.getElementById('confirmPassword').value;

            if (pass !== conf) return alert('Passwords do not match.');
            if (pass.length < 6) return alert('Password is too short.');

            const identifier = sessionStorage.getItem('resetUserIdentifier');
            const role = sessionStorage.getItem('resetUserRole');

            if (!identifier) {
                window.location.href = 'login.html';
                return;
            }

            // Sync with central student data
            let students = getTenantData('school_students', '[]');
            const idx = students.findIndex(s => (s.id === identifier || s.studentId === identifier));

            if (idx !== -1) {
                students[idx].password = pass;
                students[idx].mustChangePassword = false;
                saveTenantData('school_students', students);
                alert('Security credentials updated! Please login with your new password.');
                window.location.href = 'login.html';
            } else {
                alert('Account sync error. Please contact school IT.');
                window.location.href = 'login.html';
            }
        });
    </script>
    <!-- ACADEX: Powered-by footer and school branding -->
    <script src="../acadex/js/acadex-core.js"></script>
    <script src="../acadex/js/acadex-tenant.js"></script>

</body>

</html>
