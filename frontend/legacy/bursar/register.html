<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bursar Registration - ACADEX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: rgba(var(--school-primary-rgb, 240, 244, 255), 0.05);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px 0;
        }

        .register-container {
            max-width: 640px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(var(--school-primary-rgb, 0, 86, 179), 0.12);
            overflow: hidden;
        }

        .register-header {
            background: linear-gradient(135deg, var(--school-primary, var(--school-primary, #0056b3)), var(--school-primary-dark, var(--school-primary-dark, #003d7a)));
            color: white;
            text-align: center;
            padding: 28px 20px 20px;
        }

        .register-header img {
            width: 60px;
            margin-bottom: 10px;
        }

        .register-header h2 {
            margin: 0 0 4px;
            font-size: 1.4rem;
        }

        .register-header p {
            margin: 0;
            opacity: 0.8;
            font-size: 0.85rem;
        }

        .steps-bar {
            display: flex;
            background: #f8faff;
            border-bottom: 1px solid #e8ecf5;
        }

        .step-item {
            flex: 1;
            text-align: center;
            padding: 12px 4px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #9aacca;
            border-bottom: 3px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: all 0.3s;
        }

        .step-item .step-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #dce4f5;
            color: #9aacca;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.3s;
        }

        .step-item.active {
            color: var(--school-primary, var(--school-primary, #0056b3));
            border-bottom-color: var(--school-primary, var(--school-primary, #0056b3));
        }

        .step-item.active .step-num {
            background: var(--school-primary, var(--school-primary, #0056b3));
            color: white;
        }

        .step-item.done {
            color: #28a745;
            border-bottom-color: #28a745;
        }

        .step-item.done .step-num {
            background: #28a745;
            color: white;
        }

        .form-body {
            padding: 28px 32px;
        }

        .step-panel {
            display: none;
            animation: fadeSlide 0.3s ease;
        }

        .step-panel.active {
            display: block;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateX(15px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .step-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--school-primary, var(--school-primary, #0056b3));
            margin: 0 0 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e8f0fe;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .avatar-upload {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
        }

        .image-preview {
            width: 80px;
            height: 80px;
            border: 2px dashed #c0d0ea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #f0f4ff;
            flex-shrink: 0;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview i {
            font-size: 1.5rem;
            color: #b0bfd9;
        }

        .upload-info {
            flex: 1;
        }

        .upload-info label {
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            display: block;
        }

        .upload-info input[type="file"] {
            font-size: 0.8rem;
            color: #555;
            width: 100%;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #444;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid #dce4f5;
            border-radius: 7px;
            font-size: 0.88rem;
            font-family: inherit;
            transition: border-color 0.2s;
            background: #fafcff;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--school-primary, var(--school-primary, #0056b3));
            outline: none;
            background: white;
        }

        .form-group textarea {
            resize: vertical;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #b0bfd9;
            font-size: 0.9rem;
            pointer-events: none;
        }

        .input-group input {
            padding-right: 36px;
        }

        .section-divider {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--school-primary, var(--school-primary, #0056b3));
            margin: 18px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8f0fe;
        }

        .marital-section {
            display: none;
        }

        .marital-section.visible {
            display: block;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-prev,
        .btn-next,
        .btn-submit {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-prev {
            background: rgba(var(--school-primary-rgb, 0, 86, 179), 0.05);
            color: var(--school-primary, var(--school-primary, #0056b3));
            border: 1.5px solid rgba(var(--school-primary-rgb, 0, 86, 179), 0.3);
        }

        .btn-prev:hover {
            background: #e2eaf8;
        }

        .btn-next {
            background: var(--school-primary, var(--school-primary, #0056b3));
            color: white;
        }

        .btn-next:hover {
            background: var(--school-primary-dark, var(--school-primary-dark, #003d7a));
        }

        .btn-submit {
            background: #28a745;
            color: white;
        }

        .btn-submit:hover {
            background: #1e7e34;
        }

        .register-footer {
            text-align: center;
            padding: 16px 32px 24px;
            font-size: 0.85rem;
            color: #666;
            border-top: 1px solid #f0f4ff;
        }

        .register-footer a {
            color: var(--school-primary, var(--school-primary, #0056b3));
            font-weight: 600;
            text-decoration: none;
        }

        @media (max-width: 580px) {
            .form-body {
                padding: 20px 16px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .step-item span {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="register-container">
        <div class="register-header">
            <img src="../images/logo.png" alt="School Logo" class="acadex-school-logo">
            <h2>Bursar Registration</h2>
            <p>Create your Finance Portal account</p>
        </div>

        <div class="steps-bar">
            <div class="step-item active" id="step-tab-1">
                <div class="step-num">1</div><span>Personal</span>
            </div>
            <div class="step-item" id="step-tab-2">
                <div class="step-num">2</div><span>Employment</span>
            </div>
            <div class="step-item" id="step-tab-3">
                <div class="step-num">3</div><span>Family</span>
            </div>
            <div class="step-item" id="step-tab-4">
                <div class="step-num">4</div><span>Account</span>
            </div>
        </div>

        <div class="form-body">
            <form id="registerForm">

                <!-- STEP 1: Personal -->
                <div class="step-panel active" id="panel-1">
                    <div class="step-title"><i class="fas fa-user-circle"></i> Personal Information</div>

                    <div class="avatar-upload">
                        <div class="image-preview" id="imagePreviewWrap"><i class="fas fa-camera"></i></div>
                        <div class="upload-info">
                            <label>Profile Photo (optional)</label>
                            <input type="file" id="profilePic" accept="image/*">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name *</label>
                            <input type="text" id="firstName" placeholder="First name" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name *</label>
                            <input type="text" id="lastName" placeholder="Last name" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="dob">Date of Birth *</label>
                            <input type="date" id="dob" required>
                        </div>
                        <div class="form-group">
                            <label for="gender">Gender *</label>
                            <select id="gender" required>
                                <option value="" disabled selected>Select gender</option>
                                <option>Male</option>
                                <option>Female</option>
                                <option>Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nationalId">National ID *</label>
                            <input type="text" id="nationalId" placeholder="e.g. 63-123456 A 72" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number *</label>
                            <input type="tel" id="phone" placeholder="Enter phone number" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="address">Residential Address *</label>
                        <textarea id="address" rows="2" placeholder="Enter your full home address" required></textarea>
                    </div>

                    <div class="btn-row">
                        <button type="button" class="btn-next" onclick="goToStep(2)">Next <i
                                class="fas fa-arrow-right"></i></button>
                    </div>
                </div>

                <!-- STEP 2: Employment -->
                <div class="step-panel" id="panel-2">
                    <div class="step-title"><i class="fas fa-coins"></i> Employment Details</div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="employeeId">Employee ID *</label>
                            <div class="input-group">
                                <input type="text" id="employeeId" placeholder="e.g. BUR-001" required>
                                <i class="fas fa-id-badge"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="department">Department *</label>
                            <select id="department" required>
                                <option value="" disabled selected>Select department</option>
                                <option>Finance Office</option>
                                <option>Student Fees</option>
                                <option>Payroll</option>
                                <option>Procurement Finance</option>
                                <option>Accounts Office</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="role">Role / Position *</label>
                            <select id="role" required>
                                <option value="" disabled selected>Select role</option>
                                <option>Head Bursar</option>
                                <option>Senior Bursar</option>
                                <option>Bursar</option>
                                <option>Finance Officer</option>
                                <option>Accounts Clerk</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="qualification">Highest Qualification *</label>
                            <select id="qualification" required>
                                <option value="" disabled selected>Select qualification</option>
                                <option>Certificate</option>
                                <option>Diploma</option>
                                <option>Degree</option>
                                <option>Postgraduate Diploma</option>
                                <option>Master's Degree</option>
                                <option>PhD</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Work Email *</label>
                            <div class="input-group">
                                <input type="email" id="email" placeholder="bursar@school.ac.zw" required>
                                <i class="fas fa-envelope"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="joinDate">Join Date *</label>
                            <input type="date" id="joinDate" required>
                        </div>
                    </div>

                    <div class="btn-row">
                        <button type="button" class="btn-prev" onclick="goToStep(1)"><i class="fas fa-arrow-left"></i>
                            Back</button>
                        <button type="button" class="btn-next" onclick="goToStep(3)">Next <i
                                class="fas fa-arrow-right"></i></button>
                    </div>
                </div>

                <!-- STEP 3: Family / NOK -->
                <div class="step-panel" id="panel-3">
                    <div class="step-title"><i class="fas fa-users"></i> Family &amp; Next of Kin</div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="maritalStatus">Marital Status *</label>
                            <select id="maritalStatus" onchange="toggleSpouse()" required>
                                <option value="" disabled selected>Select status</option>
                                <option>Single</option>
                                <option>Married</option>
                                <option>Divorced</option>
                                <option>Widowed</option>
                            </select>
                        </div>
                    </div>

                    <div class="marital-section" id="spouseSection">
                        <div class="section-divider"><i class="fas fa-ring"></i> Spouse Details</div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="spouseName">Spouse's Full Name</label>
                                <input type="text" id="spouseName" placeholder="Enter spouse's name">
                            </div>
                            <div class="form-group">
                                <label for="spousePhone">Spouse's Phone</label>
                                <input type="tel" id="spousePhone" placeholder="Enter spouse's phone">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="spouseOccupation">Spouse's Occupation</label>
                            <input type="text" id="spouseOccupation" placeholder="Enter spouse's occupation">
                        </div>
                    </div>

                    <div class="section-divider"><i class="fas fa-user-shield"></i> Next of Kin</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nokName">Full Name *</label>
                            <input type="text" id="nokName" placeholder="Next of kin's name" required>
                        </div>
                        <div class="form-group">
                            <label for="nokRelation">Relationship *</label>
                            <input type="text" id="nokRelation" placeholder="e.g. Brother, Mother" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nokPhone">Phone Number *</label>
                            <input type="tel" id="nokPhone" placeholder="Next of kin's phone" required>
                        </div>
                        <div class="form-group">
                            <label for="nokAddress">Address</label>
                            <input type="text" id="nokAddress" placeholder="Next of kin's address">
                        </div>
                    </div>

                    <div class="btn-row">
                        <button type="button" class="btn-prev" onclick="goToStep(2)"><i class="fas fa-arrow-left"></i>
                            Back</button>
                        <button type="button" class="btn-next" onclick="goToStep(4)">Next <i
                                class="fas fa-arrow-right"></i></button>
                    </div>
                </div>

                <!-- STEP 4: Account -->
                <div class="step-panel" id="panel-4">
                    <div class="step-title"><i class="fas fa-lock"></i> Account Security</div>

                    <div class="form-group">
                        <label for="password">Password *</label>
                        <div class="input-group">
                            <input type="password" id="password" placeholder="Create a strong password" required>
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password *</label>
                        <div class="input-group">
                            <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>

                    <div class="btn-row">
                        <button type="button" class="btn-prev" onclick="goToStep(3)"><i class="fas fa-arrow-left"></i>
                            Back</button>
                        <button type="submit" class="btn-submit"><i class="fas fa-user-plus"></i> Create
                            Account</button>
                    </div>
                </div>

            </form>
        </div>

        <div class="register-footer">
            Already have an account? <a href="login.html">Sign In</a> &nbsp;|&nbsp; <a href="../index.html"><i
                    class="fas fa-home"></i> Home</a>
        </div>
    </div>

    <script src="../js/audit-logger.js"></script>
    <script>
        let currentStep = 1;
        const totalSteps = 4;

        document.getElementById('profilePic').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 500000) { alert('File too large! Please select an image under 500KB.'); this.value = ''; return; }
                const reader = new FileReader();
                reader.onload = e => { document.getElementById('imagePreviewWrap').innerHTML = `<img src="${e.target.result}" alt="Preview">`; };
                reader.readAsDataURL(file);
            }
        });

        function toggleSpouse() {
            const status = document.getElementById('maritalStatus').value;
            document.getElementById('spouseSection').classList.toggle('visible', status === 'Married');
        }

        function goToStep(step) {
            if (step > currentStep && !validateStep(currentStep)) return;
            for (let i = 1; i <= totalSteps; i++) {
                const tab = document.getElementById(`step-tab-${i}`);
                const panel = document.getElementById(`panel-${i}`);
                panel.classList.remove('active');
                tab.classList.remove('active', 'done');
                if (i < step) tab.classList.add('done');
                else if (i === step) tab.classList.add('active');
            }
            document.getElementById(`panel-${step}`).classList.add('active');
            currentStep = step;
            document.querySelector('.steps-bar').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function validateStep(step) {
            const required = document.querySelectorAll(`#panel-${step} [required]`);
            for (const field of required) {
                if (!field.value.trim()) {
                    field.focus();
                    field.style.borderColor = '#dc3545';
                    field.addEventListener('input', () => field.style.borderColor = '', { once: true });
                    alert('Please fill in all required fields.');
                    return false;
                }
            }
            return true;
        }

        document.getElementById('registerForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (password !== confirmPassword) { alert('Passwords do not match!'); return; }

            const bursars = getTenantData('bursars', '[]');
            const email = document.getElementById('email').value;
            if (bursars.some(b => b.email === email)) { alert('An account with this email already exists!'); return; }

            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;

            const newBursar = {
                name: firstName + ' ' + lastName,
                firstName, lastName,
                dob: document.getElementById('dob').value,
                gender: document.getElementById('gender').value,
                nationalId: document.getElementById('nationalId').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                email,
                employeeId: document.getElementById('employeeId').value,
                department: document.getElementById('department').value,
                role: document.getElementById('role').value,
                qualification: document.getElementById('qualification').value,
                joinDate: document.getElementById('joinDate').value,
                maritalStatus: document.getElementById('maritalStatus').value,
                spouseName: document.getElementById('spouseName').value,
                spousePhone: document.getElementById('spousePhone').value,
                spouseOccupation: document.getElementById('spouseOccupation').value,
                nokName: document.getElementById('nokName').value,
                nokRelation: document.getElementById('nokRelation').value,
                nokPhone: document.getElementById('nokPhone').value,
                nokAddress: document.getElementById('nokAddress').value,
                password,
                registeredDate: new Date().toISOString(),
                profilePic: null
            };

            const profilePicInput = document.getElementById('profilePic');

            function saveAndRedirect(user) {
                try {
                    bursars.push(user);
                    saveTenantData('bursars', bursars);
                    const userObj = { name: user.name, email: user.email, role: 'Bursar' };
                    saveTenantData('currentUser', userObj);
                    sessionStorage.setItem('bursarLoggedIn', 'true');
                    sessionStorage.setItem('bursarEmail', user.email);
                    sessionStorage.setItem('bursarName', user.name);
                    if (typeof AuditLogger !== 'undefined') AuditLogger.logAuth('Bursar Register', 'success', `${user.name} registered`);
                    alert('Registration successful! Redirecting to dashboard...');
                    window.location.href = 'dashboard.html';
                } catch (error) {
                    if (error.name === 'QuotaExceededError') {
                        user.profilePic = null; bursars.push(user);
                        saveTenantData('bursars', bursars);
                        window.location.href = 'dashboard.html';
                    } else { alert('An error occurred during registration.'); console.error(error); }
                }
            }

            if (profilePicInput.files && profilePicInput.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { newBursar.profilePic = e.target.result; saveAndRedirect(newBursar); };
                reader.readAsDataURL(profilePicInput.files[0]);
            } else {
                saveAndRedirect(newBursar);
            }
        });
    </script>
    <!-- ACADEX: Powered-by footer and school branding -->
    <script src="../acadex/js/acadex-core.js"></script>
    <script src="../acadex/js/acadex-tenant.js"></script>

</body>

</html>
