<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/toast.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: rgba(var(--school-primary-rgb, 240, 244, 255), 0.05); /* Subtle tint of primary color */
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px 0;
        }

        .register-container {
            max-width: 640px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(var(--school-primary-rgb, 0, 86, 179), 0.12);
            overflow: hidden;
        }

        .register-header {
            background: linear-gradient(135deg, var(--school-primary, var(--school-primary, #0056b3)), var(--school-primary-dark, var(--school-primary-dark, #003d7a)));
            color: white;
            text-align: center;
            padding: 28px 20px 20px;
        }

        .register-header img {
            width: 60px;
            margin-bottom: 10px;
        }

        .register-header h2 {
            margin: 0 0 4px;
            font-size: 1.4rem;
        }

        .register-header p {
            margin: 0;
            opacity: 0.8;
            font-size: 0.85rem;
        }

        /* Progress Steps */
        .steps-bar {
            display: flex;
            background: #f8faff;
            border-bottom: 1px solid #e8ecf5;
        }

        .step-item {
            flex: 1;
            text-align: center;
            padding: 12px 4px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #9aacca;
            border-bottom: 3px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: all 0.3s;
        }

        .step-item .step-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #dce4f5;
            color: #9aacca;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.3s;
        }

        .step-item.active {
            color: var(--school-primary, var(--school-primary, #0056b3));
            border-bottom-color: var(--school-primary, var(--school-primary, #0056b3));
        }

        .step-item.active .step-num {
            background: var(--school-primary, var(--school-primary, #0056b3));
            color: white;
        }

        .step-item.done {
            color: #28a745;
            border-bottom-color: #28a745;
        }

        .step-item.done .step-num {
            background: #28a745;
            color: white;
        }

        /* Form body */
        .form-body {
            padding: 28px 32px;
        }

        .step-panel {
            display: none;
            animation: fadeSlide 0.3s ease;
        }

        .step-panel.active {
            display: block;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateX(15px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .step-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--school-primary, var(--school-primary, #0056b3));
            margin: 0 0 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e8f0fe;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Avatar */
        .avatar-upload {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
        }

        .image-preview {
            width: 80px;
            height: 80px;
            border: 2px dashed #c0d0ea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #f0f4ff;
            flex-shrink: 0;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview i {
            font-size: 1.5rem;
            color: #b0bfd9;
        }

        .upload-info {
            flex: 1;
        }

        .upload-info label {
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            display: block;
        }

        .upload-info input[type="file"] {
            font-size: 0.8rem;
            color: #555;
            width: 100%;
        }

        /* Form elements */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }

        .form-row.single {
            grid-template-columns: 1fr;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #444;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid #dce4f5;
            border-radius: 7px;
            font-size: 0.88rem;
            font-family: inherit;
            transition: border-color 0.2s;
            background: #fafcff;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--school-primary, var(--school-primary, #0056b3));
            outline: none;
            background: white;
        }

        .form-group textarea {
            resize: vertical;
        }

        /* Input with icon */
        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #b0bfd9;
            font-size: 0.9rem;
            pointer-events: none;
        }

        .input-group input {
            padding-right: 36px;
        }

        /* Section divider inside step */
        .section-divider {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--school-primary, var(--school-primary, #0056b3));
            margin: 18px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8f0fe;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-prev,
        .btn-next,
        .btn-submit {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-prev {
            background: rgba(var(--school-primary-rgb, 0, 86, 179), 0.05);
            color: var(--school-primary, var(--school-primary, #0056b3));
            border: 1.5px solid rgba(var(--school-primary-rgb, 0, 86, 179), 0.3);
        }

        .btn-prev:hover {
            background: #e2eaf8;
        }

        .btn-next {
            background: var(--school-primary, var(--school-primary, #0056b3));
            color: white;
        }

        .btn-next:hover {
            background: var(--school-primary-dark, var(--school-primary-dark, #003d7a));
        }

        .btn-submit {
            background: #28a745;
            color: white;
        }

        .btn-submit:hover {
            background: #1e7e34;
        }

        .register-footer {
            text-align: center;
            padding: 16px 32px 24px;
            font-size: 0.85rem;
            color: #666;
            border-top: 1px solid #f0f4ff;
        }

        .register-footer a {
            color: var(--school-primary, var(--school-primary, #0056b3));
            font-weight: 600;
            text-decoration: none;
        }

        @media (max-width: 580px) {
            .form-body {
                padding: 20px 16px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .step-item span {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="register-container">
        <div class="register-header">
            <img src="../images/logo.png" alt="School Logo" class="acadex-school-logo">
            <h2 class="acadex-school-name">Student Registration</h2>
            <p>Create your student portal account</p>
        </div>

        <!-- Progress Bar -->
        <div class="steps-bar">
            <div class="step-item active" id="step-tab-1">
                <div class="step-num">1</div>
                <span>Personal</span>
            </div>
            <div class="step-item" id="step-tab-2">
                <div class="step-num">2</div>
                <span>Academic</span>
            </div>
            <div class="step-item" id="step-tab-3">
                <div class="step-num">3</div>
                <span>Parents</span>
            </div>
            <div class="step-item" id="step-tab-4">
                <div class="step-num">4</div>
                <span>Emergency</span>
            </div>
        </div>

        <div class="form-body">
            <form class="register-form" id="registerForm">

                <!-- STEP 1: Personal Info -->
                <div class="step-panel active" id="panel-1">
                    <div class="step-title"><i class="fas fa-user-circle"></i> Personal Information</div>

                    <div class="avatar-upload">
                        <div class="image-preview" id="imagePreviewWrap">
                            <i class="fas fa-camera"></i>
                        </div>
                        <div class="upload-info">
                            <label>Profile Photo (optional)</label>
                            <input type="file" id="profilePic" accept="image/*">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name *</label>
                            <input type="text" id="firstName" name="firstName" placeholder="First name" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name *</label>
                            <input type="text" id="lastName" name="lastName" placeholder="Last name" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="dob">Date of Birth *</label>
                            <input type="date" id="dob" name="dob" required>
                        </div>
                        <div class="form-group">
                            <label for="gender">Gender *</label>
                            <select id="gender" name="gender" required>
                                <option value="" disabled selected>Select gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="address">Residential Address *</label>
                            <textarea id="address" name="address" rows="2" placeholder="Enter full home address"
                                required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="religion">Religion *</label>
                            <select id="religion" name="religion" required>
                                <option value="" disabled selected>Select religion</option>
                                <option>Christianity</option>
                                <option>Islam</option>
                                <option>Hinduism</option>
                                <option>Buddhism</option>
                                <option>Judaism</option>
                                <option>Traditional</option>
                                <option>Other</option>
                                <option>None</option>
                            </select>
                        </div>
                    </div>

                    <div class="btn-row">
                        <button type="button" class="btn-next" onclick="goToStep(2)">Next <i
                                class="fas fa-arrow-right"></i></button>
                    </div>
                </div>

                <!-- STEP 2: Academic & Account -->
                <div class="step-panel" id="panel-2">
                    <div class="step-title"><i class="fas fa-school"></i> Academic &amp; Account</div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="studentId">Student ID *</label>
                            <div class="input-group">
                                <input type="text" id="studentId" name="studentId" placeholder="Generating..." readonly
                                    style="background:#e9ecef; cursor:not-allowed;">
                                <i class="fas fa-id-card"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="grade">Form / Class *</label>
                            <select id="grade" name="grade" required>
                                <option value="" disabled selected>Select class</option>
                                <option value="Form 1A">Form 1A</option>
                                <option value="Form 1B">Form 1B</option>
                                <option value="Form 1C">Form 1C</option>
                                <option value="Form 2A">Form 2A</option>
                                <option value="Form 2B">Form 2B</option>
                                <option value="Form 2C">Form 2C</option>
                                <option value="Form 3A (Sciences)">Form 3A (Sciences)</option>
                                <option value="Form 3B (Commercials)">Form 3B (Commercials)</option>
                                <option value="Form 3C (Arts)">Form 3C (Arts)</option>
                                <option value="Form 4A (Sciences)">Form 4A (Sciences)</option>
                                <option value="Form 4B (Commercials)">Form 4B (Commercials)</option>
                                <option value="Form 4C (Arts)">Form 4C (Arts)</option>
                                <option value="Lower Six (Sciences)">Lower Six (Sciences)</option>
                                <option value="Lower Six (Commercials)">Lower Six (Commercials)</option>
                                <option value="Lower Six (Arts)">Lower Six (Arts)</option>
                                <option value="Upper Six (Sciences)">Upper Six (Sciences)</option>
                                <option value="Upper Six (Commercials)">Upper Six (Commercials)</option>
                                <option value="Upper Six (Arts)">Upper Six (Arts)</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email Address *</label>
                            <div class="input-group">
                                <input type="email" id="email" name="email" placeholder="Enter email" required>
                                <i class="fas fa-envelope"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <div class="input-group">
                                <input type="tel" id="phone" name="phone" placeholder="Enter phone">
                                <i class="fas fa-phone"></i>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Password *</label>
                            <div class="input-group">
                                <input type="password" id="password" name="password" placeholder="Create password"
                                    required>
                                <i class="fas fa-lock"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password *</label>
                            <div class="input-group">
                                <input type="password" id="confirmPassword" name="confirmPassword"
                                    placeholder="Confirm password" required>
                                <i class="fas fa-lock"></i>
                            </div>
                        </div>
                    </div>

                    <div class="btn-row">
                        <button type="button" class="btn-prev" onclick="goToStep(1)"><i class="fas fa-arrow-left"></i>
                            Back</button>
                        <button type="button" class="btn-next" onclick="goToStep(3)">Next <i
                                class="fas fa-arrow-right"></i></button>
                    </div>
                </div>

                <!-- STEP 3: Parent / Guardian -->
                <div class="step-panel" id="panel-3">
                    <div class="step-title"><i class="fas fa-users"></i> Parent / Guardian Information</div>

                    <div class="section-divider"><i class="fas fa-male"></i> Father's Details</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fatherName">Father's Full Name</label>
                            <input type="text" id="fatherName" name="fatherName" placeholder="Enter father's name">
                        </div>
                        <div class="form-group">
                            <label for="fatherPhone">Father's Phone</label>
                            <input type="tel" id="fatherPhone" name="fatherPhone" placeholder="Enter father's phone">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="fatherEmail">Father's Email</label>
                        <input type="email" id="fatherEmail" name="fatherEmail" placeholder="Enter father's email">
                    </div>

                    <div class="section-divider"><i class="fas fa-female"></i> Mother's Details</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="motherName">Mother's Full Name</label>
                            <input type="text" id="motherName" name="motherName" placeholder="Enter mother's name">
                        </div>
                        <div class="form-group">
                            <label for="motherPhone">Mother's Phone</label>
                            <input type="tel" id="motherPhone" name="motherPhone" placeholder="Enter mother's phone">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="motherEmail">Mother's Email</label>
                        <input type="email" id="motherEmail" name="motherEmail" placeholder="Enter mother's email">
                    </div>

                    <div class="btn-row">
                        <button type="button" class="btn-prev" onclick="goToStep(2)"><i class="fas fa-arrow-left"></i>
                            Back</button>
                        <button type="button" class="btn-next" onclick="goToStep(4)">Next <i
                                class="fas fa-arrow-right"></i></button>
                    </div>
                </div>

                <!-- STEP 4: Emergency Contact -->
                <div class="step-panel" id="panel-4">
                    <div class="step-title"><i class="fas fa-exclamation-triangle"></i> Emergency Contact</div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="emergencyName">Contact Name *</label>
                            <input type="text" id="emergencyName" name="emergencyName"
                                placeholder="Enter emergency contact name" required>
                        </div>
                        <div class="form-group">
                            <label for="emergencyRelation">Relationship *</label>
                            <select id="emergencyRelation" name="emergencyRelation" required
                                onchange="handleRelationChange(this)">
                                <option value="" disabled selected>Select relationship</option>
                                <option>Father</option>
                                <option>Mother</option>
                                <option>Sibling</option>
                                <option>Uncle</option>
                                <option>Aunt</option>
                                <option>Grandparent</option>
                                <option>Guardian</option>
                                <option value="new">+ Add New Relationship</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="emergencyPhone">Phone Number *</label>
                            <input type="tel" id="emergencyPhone" name="emergencyPhone"
                                placeholder="Enter contact phone" required>
                        </div>
                        <div class="form-group">
                            <label for="emergencyAddress">Address *</label>
                            <input type="text" id="emergencyAddress" name="emergencyAddress"
                                placeholder="Enter contact address" required>
                        </div>
                    </div>

                    <div class="btn-row">
                        <button type="button" class="btn-prev" onclick="goToStep(3)"><i class="fas fa-arrow-left"></i>
                            Back</button>
                        <button type="submit" class="btn-submit"><i class="fas fa-user-plus"></i> Register</button>
                    </div>
                </div>

            </form>
        </div>

        <div class="register-footer">
            Already have an account? <a href="login.html">Sign In</a> &nbsp;|&nbsp; <a href="../index.html"><i
                    class="fas fa-home"></i> Home</a>
        </div>
    </div>

    <script src="../js/toast.js"></script>
    <script src="../js/script.js"></script>
    <script src="../js/fees-manager.js"></script>
    <script>
        let currentStep = 1;
        const totalSteps = 4;

        // Auto-generate Student ID
        function generateId() {
            const year = new Date().getFullYear().toString().slice(-2);
            const prefix = `STU${year}`;
            const students = getTenantData('school_students', '[]');

            // Filter students with the same year prefix
            const yearStudents = students.filter(s => s.studentId && s.studentId.startsWith(prefix));

            let nextNum = 1;
            if (yearStudents.length > 0) {
                // Find the maximum number in current year
                const nums = yearStudents.map(s => {
                    const numPart = s.studentId.replace(prefix, '');
                    return parseInt(numPart) || 0;
                });
                nextNum = Math.max(...nums) + 1;
            }

            const newId = `${prefix}${String(nextNum).padStart(7, '0')}`;
            document.getElementById('studentId').value = newId;
        }

        // Handle Emergency Relation "Add New"
        const customRelationsKey = 'school_custom_relations';
        function loadRelations() {
            const select = document.getElementById('emergencyRelation');
            const custom = getTenantData(customRelationsKey, '[]');

            // Remove existing custom options before "+ Add New"
            const options = Array.from(select.options);
            const addNewIdx = options.findIndex(opt => opt.value === 'new');

            custom.forEach(rel => {
                if (!options.some(opt => opt.text === rel)) {
                    const opt = document.createElement('option');
                    opt.text = rel;
                    opt.value = rel;
                    select.add(opt, select.options[addNewIdx]);
                }
            });
        }

        function handleRelationChange(select) {
            if (select.value === 'new') {
                const newRel = prompt("Enter new relationship type:");
                if (newRel && newRel.trim()) {
                    const relations = getTenantData(customRelationsKey, '[]');
                    if (!relations.includes(newRel.trim())) {
                        relations.push(newRel.trim());
                        saveTenantData(customRelationsKey, relations);
                    }

                    const opt = document.createElement('option');
                    opt.text = newRel.trim();
                    opt.value = newRel.trim();
                    select.add(opt, select.options[select.length - 1]);
                    select.value = newRel.trim();
                } else {
                    select.value = "";
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            generateId();
            loadRelations();
        });

        // Profile Picture Preview
        document.getElementById('profilePic').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 500000) {
                    Toast.error('File is too large! Please select an image under 500KB.');
                    this.value = '';
                    return;
                }
                const reader = new FileReader();
                reader.onload = function (e) {
                    const wrap = document.getElementById('imagePreviewWrap');
                    wrap.innerHTML = `<img src="${e.target.result}" alt="Profile Preview">`;
                };
                reader.readAsDataURL(file);
            }
        });

        // Step navigation
        function goToStep(step) {
            if (step > currentStep && !validateStep(currentStep)) return;

            for (let i = 1; i <= totalSteps; i++) {
                const tab = document.getElementById(`step-tab-${i}`);
                const panel = document.getElementById(`panel-${i}`);
                panel.classList.remove('active');
                tab.classList.remove('active', 'done');
                if (i < step) tab.classList.add('done');
                else if (i === step) tab.classList.add('active');
            }
            document.getElementById(`panel-${step}`).classList.add('active');
            currentStep = step;
            document.querySelector('.steps-bar').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function validateStep(step) {
            const required = document.querySelectorAll(`#panel-${step} [required]`);
            for (const field of required) {
                if (!field.value.trim()) {
                    field.focus();
                    field.style.borderColor = '#dc3545';
                    field.addEventListener('input', () => field.style.borderColor = '', { once: true });
                    Toast.warning(`Please fill in "${field.previousElementSibling.innerText.replace(' *', '')}"`);
                    return false;
                }
            }
            return true;
        }

        // Form submit — all original logic preserved
        document.addEventListener('DOMContentLoaded', function () {
            const registerForm = document.getElementById('registerForm');
            const profilePicInput = document.getElementById('profilePic');

            registerForm.addEventListener('submit', function (e) {
                e.preventDefault();

                const firstName = document.getElementById('firstName').value;
                const lastName = document.getElementById('lastName').value;
                const studentId = document.getElementById('studentId').value;
                const grade = document.getElementById('grade').value;
                const email = document.getElementById('email').value;
                const phone = document.getElementById('phone').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                const dob = document.getElementById('dob').value;
                const gender = document.getElementById('gender').value;
                const address = document.getElementById('address').value;

                const fatherName = document.getElementById('fatherName').value;
                const fatherPhone = document.getElementById('fatherPhone').value;
                const fatherEmail = document.getElementById('fatherEmail').value;
                const motherName = document.getElementById('motherName').value;
                const motherPhone = document.getElementById('motherPhone').value;
                const motherEmail = document.getElementById('motherEmail').value;

                const emergencyName = document.getElementById('emergencyName').value;
                const emergencyRelation = document.getElementById('emergencyRelation').value;
                const emergencyPhone = document.getElementById('emergencyPhone').value;
                const emergencyAddress = document.getElementById('emergencyAddress').value;

                if (password !== confirmPassword) {
                    Toast.error('Passwords do not match!');
                    return;
                }

                const religion = document.getElementById('religion').value;

                const students = getTenantData('school_students', '[]');
                if (students.some(s => s.email === email || s.studentId === studentId || s.id === studentId)) {
                    Toast.error('Account with this email or Student ID already exists!');
                    return;
                }

                const feeItems = FeesManager.getFeeForClass(grade);
                const totalFees = FeesManager.calculateTotal(feeItems);

                const newStudent = {
                    // Student Portal Fields
                    firstName, lastName, studentId, grade, email, phone, password,
                    dob, gender, address,
                    fatherName, fatherPhone, fatherEmail,
                    motherName, motherPhone, motherEmail,
                    emergencyName, emergencyRelation, emergencyPhone, emergencyAddress,
                    religion,
                    registeredDate: new Date().toISOString(),
                    createdAt: new Date().toISOString(),
                    profilePic: null,
                    balance: totalFees,

                    // Admin Portal Mapping
                    id: studentId,
                    name: `${firstName} ${lastName}`,
                    class: grade,
                    photo: null,
                    status: 'Active',
                    primaryRole: 'Student'
                };

                const saveAndRedirect = (student) => {
                    try {
                        students.push(student);
                        saveTenantData('school_students', students);
                        sessionStorage.setItem('studentLoggedIn', 'true');
                        sessionStorage.setItem('studentEmail', email);
                        sessionStorage.setItem('studentName', firstName + ' ' + lastName);
                        sessionStorage.setItem('studentId', studentId);
                        saveTenantData('studentBalance', student.balance.toString());
                        Toast.success('Registration successful! Redirecting to login...');
                        setTimeout(() => window.location.href = 'login.html', 1500);
                    } catch (error) {
                        if (error.name === 'QuotaExceededError') {
                            Toast.warning('Storage full! Registering without profile picture.');
                            students.push({ ...student, profilePic: null, photo: null });
                            saveTenantData('school_students', students);
                            setTimeout(() => window.location.href = 'login.html', 1500);
                        } else {
                            console.error(error);
                            Toast.error('Error saving registration.');
                        }
                    }
                };

                if (profilePicInput.files && profilePicInput.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        newStudent.profilePic = e.target.result;
                        newStudent.photo = e.target.result; // Admin sync
                        saveAndRedirect(newStudent);
                    };
                    reader.readAsDataURL(profilePicInput.files[0]);
                } else {
                    saveAndRedirect(newStudent);
                }
            });
        });
    </script>
    <!-- ACADEX: Powered-by footer and school branding -->
    <script src="../acadex/js/acadex-core.js"></script>
    <script src="../acadex/js/acadex-tenant.js"></script>

</body>
