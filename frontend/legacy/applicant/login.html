<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applicant Login - Your School</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, var(--school-primary-dark, #1a1a1a) 0%, var(--school-primary, #2c3e50) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }

        .login-logo {
            margin-bottom: 30px;
            color: var(--school-primary, var(--school-primary, #0056b3));
        }

        .login-logo i {
            font-size: 3rem;
            margin-bottom: 10px;
            display: block;
        }

        .login-logo h2 {
            margin: 0;
            font-size: 1.5rem;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--school-primary, var(--school-primary, #0056b3));
            outline: none;
            box-shadow: 0 0 0 3px rgba(var(--school-primary-rgb), 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--school-primary, var(--school-primary, #0056b3));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: var(--school-primary-dark, var(--school-primary-dark, #003d82));
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: var(--school-primary, var(--school-primary, #0056b3));
        }

        .alert {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-user-clock"></i>
            <h2>Track Application</h2>
            <p style="color: #666; font-size: 0.9rem; margin-top: 5px;">Login using your App ID & Password</p>
        </div>

        <div id="loginAlert" class="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>School Access Code</label>
                <input type="text" class="form-control" id="schoolCode" placeholder="e.g. AX-P12345" required style="text-transform:uppercase">
            </div>
            <div class="form-group">
                <label>Application ID</label>
                <input type="text" class="form-control" id="appId" placeholder="e.g. APP-26000001" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login">Login to Portal</button>
        </form>

        <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>

    <!-- ACADEX: Powered-by footer and school branding -->
    <script src="../acadex/js/acadex-core.js"></script>
    <script src="../acadex/js/acadex-tenant.js"></script>
    <script src="js/login.js"></script>

</body>

</html>
