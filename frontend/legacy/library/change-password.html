<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Bursar Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: rgba(var(--school-primary-rgb, 240, 244, 255), 0.03);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(var(--school-primary-rgb, 0, 86, 179), 0.12);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, var(--school-primary, var(--school-primary, #0056b3)), var(--school-primary-dark, var(--school-primary-dark, #003d7a)));
            color: white;
            text-align: center;
            padding: 32px 24px 24px;
        }

        .login-header img {
            width: 64px;
            margin-bottom: 12px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .login-header h2 {
            margin: 0 0 5px;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .login-header p {
            margin: 0;
            opacity: 0.8;
            font-size: 0.85rem;
        }

        .login-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        .login-body {
            padding: 32px 32px 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #444;
        }

        .input-group {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 11px 40px 11px 14px;
            border: 1.5px solid #dce4f5;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafcff;
        }

        .input-group input:focus {
            border-color: var(--school-primary, var(--school-primary, #0056b3));
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(var(--school-primary-rgb, 0, 86, 179), 0.08);
        }

        .input-group i {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: #b0bfd9;
            font-size: 0.88rem;
            pointer-events: none;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: linear-gradient(135deg, var(--school-primary, var(--school-primary, #0056b3)), var(--school-primary-dark, var(--school-primary-dark, #003d7a)));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-login:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .login-footer {
            text-align: center;
            padding: 18px 32px 24px;
            font-size: 0.85rem;
            color: #666;
            border-top: 1px solid #f0f4ff;
        }

        .login-footer a {
            color: var(--school-primary, var(--school-primary, #0056b3));
            font-weight: 600;
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <img src="../images/logo.png" alt="Logo" class="acadex-school-logo">
            <h2>Set New Password</h2>
            <p>Please update your password to continue</p>
            <span class="login-badge"><i class="fas fa-key"></i> Security Update</span>
        </div>

        <div class="login-body">
            <form id="changePasswordForm">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <div class="input-group">
                        <input type="password" id="newPassword" placeholder="Enter new password" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-group">
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                        <i class="fas fa-shield-alt"></i>
                    </div>
                </div>
                <button type="submit" class="btn-login"><i class="fas fa-save"></i> Update Password</button>
            </form>
        </div>

        <div class="login-footer">
            <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>

    <script>
        document.getElementById('changePasswordForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const identifier = sessionStorage.getItem('resetUserIdentifier');

            if (newPass !== confirmPass) {
                alert('Passwords do not match.');
                return;
            }

            if (newPass.length < 6) {
                alert('Password must be at least 6 characters.');
                return;
            }

            // Update in localStorage
            const librarians = getTenantData('school_librarians', '[]');
            const index = librarians.findIndex(l =>
                (l.email && l.email.toLowerCase() === identifier.toLowerCase()) ||
                (l.employeeId && l.employeeId.toLowerCase() === identifier.toLowerCase()) ||
                (l.id && l.id.toLowerCase() === identifier.toLowerCase())
            );

            if (index !== -1) {
                librarians[index].password = newPass;
                librarians[index].mustChangePassword = false;
                saveTenantData('school_librarians', librarians);

                alert('Password updated successfully! Please log in with your new password.');
                sessionStorage.removeItem('resetUserIdentifier');
                window.location.href = 'login.html';
            } else {
                alert('Account error. Please contact administrator.');
            }
        });
    </script>
    <!-- ACADEX: Powered-by footer and school branding -->
    <script src="../acadex/js/acadex-core.js"></script>
    <script src="../acadex/js/acadex-tenant.js"></script>

</body>

</html>
