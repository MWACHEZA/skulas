<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Admin Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: var(--school-primary-dark, #1a1a1a);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            padding: 40px 30px;
            text-align: center;
        }

        .header i {
            font-size: 3rem;
            color: #111;
            margin-bottom: 20px;
        }

        h2 { margin: 0 0 10px; color: #333; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 30px; }

        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; color: #444; }
        
        .input-group { position: relative; }
        input {
            width: 100%;
            padding: 12px 14px 12px 14px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--school-primary); }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--school-primary, #111);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover { opacity: 0.9; }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <i class="fas fa-key-skeleton"></i>
        </div>
        <h2>Reset Password</h2>
        <p>Your administrator has reset your password. Please set a new secure password to continue.</p>

        <form id="changeForm">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" required placeholder="Enter new password">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" required placeholder="Confirm new password">
            </div>
            <button type="submit" class="btn-submit">Update & Sign In</button>
        </form>
    </div>

    <script>
        document.getElementById('changeForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const pass = document.getElementById('newPassword').value;
            const conf = document.getElementById('confirmPassword').value;

            if (pass !== conf) return alert('Passwords do not match.');
            if (pass.length < 6) return alert('Password must be at least 6 characters.');

            const identifier = sessionStorage.getItem('resetUserIdentifier');
            const role = sessionStorage.getItem('resetUserRole');

            if (!identifier || !role) {
                alert('Session expired. Please login again.');
                window.location.href = 'login.html';
                return;
            }

            const keyMap = {
                admin: 'adminUsers',
                student: 'school_students',
                teacher: 'school_teachers',
                librarian: 'school_librarians',
                bursar: 'school_bursars',
                ancillary: 'ancillaryStaff'
            };
            const storageKey = keyMap[role];
            let users = getTenantData(storageKey, []);
            const idx = users.findIndex(u => (u.username || u.id || u.studentId || u.staffId) === identifier);

            if (idx !== -1) {
                users[idx].password = pass;
                users[idx].mustChangePassword = false;
                saveTenantData(storageKey, users);
                alert('Password updated successfully! Redirecting...');
                window.location.href = 'login.html';
            } else {
                alert('User synchronization error.');
                window.location.href = 'login.html';
            }
        });
    </script>
    <!-- ACADEX: Powered-by footer and school branding -->
    <script src="../acadex/js/acadex-core.js"></script>
    <script src="../acadex/js/acadex-tenant.js"></script>

</body>

</html>
