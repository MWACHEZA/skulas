<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Registration - Your School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: rgba(var(--school-primary-rgb, 238, 244, 255), 0.05);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 24px 16px;
        }

        .register-container {
            max-width: 620px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(var(--school-primary-rgb), 0.12);
            overflow: hidden;
        }

        .register-header {
            background: linear-gradient(135deg, var(--school-primary, var(--school-primary, #0056b3)), var(--school-primary-dark, var(--school-primary-dark, #003d7a)));
            color: white;
            text-align: center;
            padding: 28px 20px 20px;
        }

        .register-header img {
            width: 60px;
            margin-bottom: 10px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .register-header h2 {
            margin: 0 0 4px;
            font-size: 1.4rem;
        }

        .register-header p {
            margin: 0;
            opacity: 0.8;
            font-size: 0.84rem;
        }

        .steps-bar {
            display: flex;
            background: #f8faff;
            border-bottom: 1px solid #e8ecf5;
        }

        .step-item {
            flex: 1;
            text-align: center;
            padding: 11px 4px;
            font-size: 0.67rem;
            font-weight: 600;
            color: #9aacca;
            border-bottom: 3px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: all 0.3s;
        }

        .step-item .step-num {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #dce4f5;
            color: #9aacca;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            font-weight: 700;
            transition: all 0.3s;
        }

        .step-item.active {
            color: var(--school-primary, var(--school-primary, #0056b3));
            border-bottom-color: var(--school-primary, var(--school-primary, #0056b3));
        }

        .step-item.active .step-num {
            background: var(--school-primary, var(--school-primary, #0056b3));
            color: white;
        }

        .step-item.done {
            color: #28a745;
            border-bottom-color: #28a745;
        }

        .step-item.done .step-num {
            background: #28a745;
            color: white;
        }

        .form-body {
            padding: 24px 28px;
        }

        .step-panel {
            display: none;
            animation: fadeSlide 0.3s ease;
        }

        .step-panel.active {
            display: block;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateX(12px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .step-title {
            font-size: 0.92rem;
            font-weight: 700;
            color: var(--school-primary, var(--school-primary, #0056b3));
            margin: 0 0 18px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e8f0fe;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .avatar-upload {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 14px;
        }

        .image-preview {
            width: 72px;
            height: 72px;
            border: 2px dashed #c0d0ea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #f0f4ff;
            flex-shrink: 0;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview i {
            font-size: 1.4rem;
            color: #b0bfd9;
        }

        .upload-info label {
            font-size: 0.78rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
            display: block;
        }

        .upload-info input[type="file"] {
            font-size: 0.78rem;
            color: #555;
            width: 100%;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-group {
            margin-bottom: 13px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #444;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid #dce4f5;
            border-radius: 7px;
            font-size: 0.87rem;
            font-family: inherit;
            transition: border-color 0.2s;
            background: #fafcff;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--school-primary, var(--school-primary, #0056b3));
            outline: none;
            background: white;
        }

        .form-group textarea {
            resize: vertical;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            right: 11px;
            top: 50%;
            transform: translateY(-50%);
            color: #b0bfd9;
            font-size: 0.85rem;
            pointer-events: none;
        }

        .input-group input {
            padding-right: 34px;
        }

        .section-subtitle {
            font-size: 0.76rem;
            font-weight: 700;
            color: var(--school-primary, var(--school-primary, #0056b3));
            margin: 14px 0 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-subtitle::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8f0fe;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 22px;
        }

        .btn-prev,
        .btn-next,
        .btn-submit {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-prev {
            background: #f0f4ff;
            color: var(--school-primary, var(--school-primary, #0056b3));
            border: 1.5px solid #c0d0ea;
        }

        .btn-prev:hover {
            background: #e2eaf8;
        }

        .btn-next {
            background: var(--school-primary, var(--school-primary, #0056b3));
            color: white;
        }

        .btn-next:hover {
            background: var(--school-primary-dark, var(--school-primary-dark, #003d7a));
        }

        .btn-submit {
            background: #28a745;
            color: white;
        }

        .btn-submit:hover {
            background: #1e7e34;
        }

        .register-footer {
            text-align: center;
            padding: 14px 28px 22px;
            font-size: 0.84rem;
            color: #666;
            border-top: 1px solid #f0f4ff;
        }

        .register-footer a {
            color: var(--school-primary, var(--school-primary, #0056b3));
            font-weight: 600;
            text-decoration: none;
        }

        @media (max-width: 580px) {
            .form-body {
                padding: 18px 14px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .step-item span {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="register-container">
        <div class="register-header">
            <img src="../images/logo.png" alt="Your School Logo">
            <h2>Alumni Registration</h2>
            <p>Join the Acadex Alumni Network</p>
        </div>

        <div class="steps-bar">
            <div class="step-item active" id="step-tab-1">
                <div class="step-num">1</div><span>Personal</span>
            </div>
            <div class="step-item" id="step-tab-2">
                <div class="step-num">2</div><span>School</span>
            </div>
            <div class="step-item" id="step-tab-3">
                <div class="step-num">3</div><span>Career</span>
            </div>
            <div class="step-item" id="step-tab-4">
                <div class="step-num">4</div><span>Account</span>
            </div>
        </div>

        <div class="form-body">
            <form id="registerForm">

                <!-- STEP 1: Personal Info -->
                <div class="step-panel active" id="panel-1">
                    <div class="step-title"><i class="fas fa-user"></i> Personal Information</div>
                    <div class="avatar-upload">
                        <div class="image-preview" id="imgPreview"><i class="fas fa-camera"></i></div>
                        <div class="upload-info">
                            <label>Profile Photo (optional)</label>
                            <input type="file" id="profilePic" accept="image/*">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name *</label>
                            <input type="text" id="firstName" placeholder="First name" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name *</label>
                            <input type="text" id="lastName" placeholder="Last name" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="dob">Date of Birth</label>
                            <input type="date" id="dob">
                        </div>
                        <div class="form-group">
                            <label for="gender">Gender</label>
                            <select id="gender">
                                <option value="" disabled selected>Select</option>
                                <option>Male</option>
                                <option>Female</option>
                                <option>Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" placeholder="+263 77 xxx xxxx" required>
                    </div>
                    <div class="form-group">
                        <label for="address">Current Address</label>
                        <textarea id="address" rows="2" placeholder="City, Country"></textarea>
                    </div>
                    <div class="btn-row">
                        <button type="button" class="btn-next" onclick="goToStep(2)">Next <i
                                class="fas fa-arrow-right"></i></button>
                    </div>
                </div>

                <!-- STEP 2: School Info -->
                <div class="step-panel" id="panel-2">
                    <div class="step-title"><i class="fas fa-graduation-cap"></i> School Information</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="gradYear">Graduation Year *</label>
                            <select id="gradYear" required>
                                <option value="" disabled selected>Select Year</option>
                                <script>
                                    const cy = new Date().getFullYear();
                                    for (let y = cy; y >= 1970; y--) document.write(`<option value="${y}">${y}</option>`);
                                </script>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="form">Form Completed</label>
                            <select id="form">
                                <option value="" disabled selected>Select Form</option>
                                <option>Form 4 (O-Level)</option>
                                <option>Form 6 (A-Level)</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="houseStream">House / Stream</label>
                        <input type="text" id="houseStream" placeholder="e.g. Mzilikazi House, Science Stream">
                    </div>
                    <div class="form-group">
                        <label for="favoriteSubject">Favourite Subject</label>
                        <input type="text" id="favoriteSubject" placeholder="e.g. Mathematics">
                    </div>
                    <div class="form-group">
                        <label for="memorableTeacher">Most Memorable Teacher</label>
                        <input type="text" id="memorableTeacher" placeholder="Teacher's name">
                    </div>
                    <div class="btn-row">
                        <button type="button" class="btn-prev" onclick="goToStep(1)"><i class="fas fa-arrow-left"></i>
                            Back</button>
                        <button type="button" class="btn-next" onclick="goToStep(3)">Next <i
                                class="fas fa-arrow-right"></i></button>
                    </div>
                </div>

                <!-- STEP 3: Career Info -->
                <div class="step-panel" id="panel-3">
                    <div class="step-title"><i class="fas fa-briefcase"></i> Career & Professional Info</div>
                    <div class="form-group">
                        <label for="occupation">Current Occupation *</label>
                        <input type="text" id="occupation" placeholder="e.g. Software Engineer" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="company">Company / Organization</label>
                            <input type="text" id="company" placeholder="Employer name">
                        </div>
                        <div class="form-group">
                            <label for="industry">Industry / Sector</label>
                            <select id="industry">
                                <option value="" disabled selected>Select</option>
                                <option>Education</option>
                                <option>Healthcare</option>
                                <option>Technology</option>
                                <option>Finance</option>
                                <option>Engineering</option>
                                <option>Law</option>
                                <option>Agriculture</option>
                                <option>Government</option>
                                <option>Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="currentLocation">Current Location *</label>
                        <input type="text" id="currentLocation" placeholder="City, Country" required>
                    </div>
                    <div class="form-group">
                        <label for="bio">Short Bio</label>
                        <textarea id="bio" rows="3" placeholder="A short description about yourself..."></textarea>
                    </div>
                    <div class="btn-row">
                        <button type="button" class="btn-prev" onclick="goToStep(2)"><i class="fas fa-arrow-left"></i>
                            Back</button>
                        <button type="button" class="btn-next" onclick="goToStep(4)">Next <i
                                class="fas fa-arrow-right"></i></button>
                    </div>
                </div>

                <!-- STEP 4: Account -->
                <div class="step-panel" id="panel-4">
                    <div class="step-title"><i class="fas fa-lock"></i> Account Security</div>
                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <div class="input-group">
                            <input type="email" id="email" placeholder="Enter your email" required>
                            <i class="fas fa-envelope"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="password">Password *</label>
                        <div class="input-group">
                            <input type="password" id="password" placeholder="Create a strong password" required>
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password *</label>
                        <div class="input-group">
                            <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>
                    <div class="btn-row">
                        <button type="button" class="btn-prev" onclick="goToStep(3)"><i class="fas fa-arrow-left"></i>
                            Back</button>
                        <button type="submit" class="btn-submit"><i class="fas fa-user-plus"></i> Create
                            Account</button>
                    </div>
                </div>

            </form>
        </div>

        <div class="register-footer">
            Already registered? <a href="login.html">Sign In</a> &nbsp;|&nbsp; <a href="../index.html"><i
                    class="fas fa-home"></i> Home</a>
        </div>
    </div>

    <script src="../js/app-utils.js"></script>
    <script>
        let currentStep = 1;
        const totalSteps = 4;

        document.getElementById('profilePic').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => { document.getElementById('imgPreview').innerHTML = `<img src="${e.target.result}" alt="Preview">`; };
                reader.readAsDataURL(file);
            }
        });

        function goToStep(step) {
            if (step > currentStep && !validateStep(currentStep)) return;
            for (let i = 1; i <= totalSteps; i++) {
                const tab = document.getElementById(`step-tab-${i}`);
                const panel = document.getElementById(`panel-${i}`);
                panel.classList.remove('active');
                tab.classList.remove('active', 'done');
                if (i < step) tab.classList.add('done');
                else if (i === step) tab.classList.add('active');
            }
            document.getElementById(`panel-${step}`).classList.add('active');
            currentStep = step;
        }

        function validateStep(step) {
            const required = document.querySelectorAll(`#panel-${step} [required]`);
            for (const field of required) {
                if (!field.value.trim()) {
                    field.focus();
                    field.style.borderColor = '#dc3545';
                    field.addEventListener('input', () => field.style.borderColor = '', { once: true });
                    alert('Please fill in all required fields.');
                    return false;
                }
            }
            return true;
        }

        document.getElementById('registerForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (password !== confirmPassword) { alert('Passwords do not match!'); return; }

            const alumni = getTenantData('school_alumni', '[]');
            const email = document.getElementById('email').value;
            if (alumni.some(a => a.email === email)) { alert('An account with this email already exists.'); return; }

            let alumniId = 'ALM' + Date.now();
            if (typeof AppUtils !== 'undefined' && AppUtils.generateNextId) {
                alumniId = AppUtils.generateNextId(AppUtils.ID_PREFIX ? AppUtils.ID_PREFIX.ALUMNI : 'ALM');
            }

            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;

            const newAlumnus = {
                id: alumniId,
                firstName, lastName,
                name: firstName + ' ' + lastName,
                dob: document.getElementById('dob').value,
                gender: document.getElementById('gender').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                email,
                year: document.getElementById('gradYear').value,
                form: document.getElementById('form').value,
                houseStream: document.getElementById('houseStream').value,
                favoriteSubject: document.getElementById('favoriteSubject').value,
                memorableTeacher: document.getElementById('memorableTeacher').value,
                profession: document.getElementById('occupation').value,
                company: document.getElementById('company').value,
                industry: document.getElementById('industry').value,
                currentLocation: document.getElementById('currentLocation').value,
                bio: document.getElementById('bio').value,
                password,
                joined: new Date().toLocaleDateString('en-US', { month: 'short', year: 'numeric' }),
                photo: null
            };

            const picInput = document.getElementById('profilePic');
            function saveAndRedirect(user) {
                alumni.push(user);
                saveTenantData('school_alumni', alumni);
                sessionStorage.setItem('loggedIn', 'true');
                sessionStorage.setItem('userEmail', user.email);
                sessionStorage.setItem('userName', user.name);
                sessionStorage.setItem('userId', user.id);
                sessionStorage.setItem('alumniUser', JSON.stringify(user));
                alert('Registration successful! Welcome, ' + user.firstName + '!');
                window.location.href = 'dashboard.html';
            }

            if (picInput.files && picInput.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { newAlumnus.photo = e.target.result; saveAndRedirect(newAlumnus); };
                reader.readAsDataURL(picInput.files[0]);
            } else {
                saveAndRedirect(newAlumnus);
            }
        });
    </script>
    <!-- ACADEX: Powered-by footer and school branding -->
    <script src="../acadex/js/acadex-core.js"></script>
    <script src="../acadex/js/acadex-tenant.js"></script>

</body>

</html>
