<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Application - Embakwe High School</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .login-card {
            max-width: 450px;
            margin: 50px auto;
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .login-header {
            margin-bottom: 30px;
        }

        .login-header i {
            font-size: 3.5rem;
            color: #0056b3;
            margin-bottom: 15px;
            background: #e3f2fd;
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
        }

        .login-header h2 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 5px;
        }

        .form-control {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
            margin-bottom: 20px;
            text-align: left;
        }

        .form-control:focus {
            border-color: #0056b3;
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 86, 179, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0056b3 0%, #004494 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 86, 179, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 86, 179, 0.4);
        }

        .info-box {
            background: #fff8e1;
            border-radius: 8px;
            padding: 15px;
            margin-top: 30px;
            font-size: 0.9rem;
            color: #856404;
            border-left: 4px solid #ffc107;
            text-align: left;
        }

        .alert {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: #0056b3;
        }
    </style>
</head>

<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="container">
            <div class="contact-info">
                <span><i class="fas fa-phone"></i> +263 123 456 789</span>
            </div>
            <div class="portal-links">
                <a href="index.html" style="color:white;"><i class="fas fa-home"></i> Home</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <img src="images/logo.png" alt="School Logo" id="sidebarLogo" class="acadex-school-logo" style="width: 80px; height: 80px; object-fit: contain; margin-bottom: 15px;">
                <h2 class="acadex-school-name">Applicant Portal</h2>
                <p style="color: #777;">Track your admission status</p>
            </div>

            <div id="loginAlert" class="alert"></div>

            <form id="loginForm">
                <div style="text-align: left; margin-bottom: 5px; font-weight: 500; color: #555;">School Access Code</div>
                <input type="text" class="form-control" id="schoolCode" placeholder="Enter School Code" required>

                <div style="text-align: left; margin-bottom: 5px; font-weight: 500; color: #555;">Application ID</div>
                <input type="text" class="form-control" id="appId" placeholder="e.g. F1-123456" required>

                <div style="text-align: left; margin-bottom: 5px; font-weight: 500; color: #555;">Password</div>
                <input type="password" class="form-control" id="password" placeholder="••••••" required>

                <button type="submit" class="btn-login">Secure Login</button>
            </form>

            <div class="info-box">
                <i class="fas fa-lightbulb"></i> <strong>Note:</strong> Check your application confirmation for your
                Login ID and Password.
            </div>

            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script src="acadex/js/acadex-core.js"></script>
    <script src="acadex/js/acadex-tenant.js"></script>
    <script src="applicant/js/login.js"></script>
</body>

</html>
