<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - ACADEX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: rgba(var(--school-primary-rgb), 0.05); font-family: 'Poppins', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: white; border-radius: 16px; padding: 40px 30px; text-align: center; box-shadow: 0 10px 30px rgba(var(--school-primary-rgb), 0.12); }
        .icon { font-size: 3rem; color: var(--school-primary); margin-bottom: 20px; }
        h2 { margin: 0 0 10px; color: #333; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; color: #444; }
        input { width: 100%; padding: 12px; border: 2px solid #dce4f5; border-radius: 8px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: var(--school-primary); }
        .btn { width: 100%; padding: 14px; background: var(--school-primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon"><i class="fas fa-key-skeleton"></i></div>
        <h2>Ancillary Security</h2>
        <p>Your password has been reset. Please set a new secure password to access your staff portal.</p>
        <form id="changeForm">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="pass" required placeholder="Enter new password">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="conf" required placeholder="Re-enter password">
            </div>
            <button type="submit" class="btn">Update & Login</button>
        </form>
    </div>
    <script>
        document.getElementById('changeForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const pass = document.getElementById('pass').value;
            const conf = document.getElementById('conf').value;
            if (pass !== conf) return alert('Passwords do not match.');
            if (pass.length < 6) return alert('Password too short.');

            const identifier = sessionStorage.getItem('resetUserIdentifier');
            if (!identifier) return window.location.href = 'login.html';

            let staff = getTenantData('ancillaryStaff', '[]');
            const idx = staff.findIndex(s => (s.email === identifier || s.id === identifier));

            if (idx !== -1) {
                staff[idx].password = pass;
                staff[idx].mustChangePassword = false;
                saveTenantData('ancillaryStaff', staff);
                alert('Success! Credentials updated.');
                window.location.href = 'login.html';
            } else {
                alert('Account sync error.');
                window.location.href = 'login.html';
            }
        });
    </script>
    <!-- ACADEX: Powered-by footer and school branding -->
    <script src="../acadex/js/acadex-core.js"></script>
    <script src="../acadex/js/acadex-tenant.js"></script>

</body>

</html>
