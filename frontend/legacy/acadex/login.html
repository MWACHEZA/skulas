<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Login — ACADEX</title>
  <meta name="description" content="Login to your school's ACADEX portal. Enter your school code and select your role." />
  <link rel="stylesheet" href="css/acadex.css" />
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; background: var(--grad-hero); }
    .login-bg {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(var(--school-primary-rgb, 37, 99, 235), 0.2), transparent 60%);
      pointer-events: none;
    }
    .login-grid {
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(var(--school-primary-rgb, 37, 99, 235), 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(var(--school-primary-rgb, 37, 99, 235), 0.04) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none;
    }
    .login-wrapper {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 2rem 1.5rem; position: relative; z-index: 1;
    }
    .login-box { width: 100%; max-width: 460px; }
    .login-logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 2rem; }
    .login-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 2.5rem; backdrop-filter: blur(20px); }
    .login-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 0.4rem; }
    .login-sub { text-align: center; font-size: 0.875rem; color: var(--acadex-gray-400); margin-bottom: 2rem; }
    .role-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.6rem; margin-bottom: 1.5rem; }
    .role-opt { border: 1.5px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 8px; cursor: pointer; transition: var(--transition); text-align: center; }
    .role-opt:hover { border-color: rgba(var(--school-primary-rgb, 37, 99, 235), 0.5); background: rgba(var(--school-primary-rgb, 37, 99, 235), 0.06); }
    .role-opt.selected { border-color: var(--school-primary, var(--acadex-blue-light)); background: rgba(var(--school-primary-rgb, 37, 99, 235), 0.12); }
    .role-opt-icon { font-size: 1.4rem; margin-bottom: 4px; }
    .role-opt-name { font-size: 0.72rem; font-weight: 700; color: var(--acadex-gray-300); }
    .or-divider { display: flex; align-items: center; gap: 12px; margin: 1.25rem 0; color: var(--acadex-gray-600); font-size: 0.8rem; }
    .or-divider::before,.or-divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.07); }
    .school-preview { background: rgba(var(--school-primary-rgb, 37, 99, 235), 0.08); border: 1px solid rgba(var(--school-primary-rgb, 37, 99, 235), 0.2); border-radius: 12px; padding: 1rem; margin-bottom: 1.25rem; display: none; }
    .school-preview.show { display: block; }
    .sp-name { font-weight: 700; font-size: 1rem; }
    .sp-meta { font-size: 0.78rem; color: var(--acadex-gray-400); margin-top: 3px; }
  </style>
</head>
<body>
<div class="login-bg"></div>
<div class="login-grid"></div>

<div class="login-wrapper">
  <div class="login-box">
    <div class="login-logo">
      <a href="index.html" style="display:flex;align-items:center;gap:10px;">
        <div class="nav-logo-icon">A</div>
        <div class="nav-logo-text">ACAD<span>EX</span></div>
      </a>
    </div>
    <div class="login-card animate-in">
      <div class="login-title">School Portal Login</div>
      <div class="login-sub">Enter your school code to continue</div>

      <!-- School Code Input -->
      <div class="form-group">
        <label class="form-label">School Code</label>
        <div style="display:flex;gap:8px;">
          <input type="text" class="form-control" id="schoolCodeInput" placeholder="e.g. AX-AB1234" style="flex:1;text-transform:uppercase;letter-spacing:0.04em;" oninput="lookupSchool()" />
          <button class="btn btn-ghost" onclick="lookupSchool()" style="padding:11px 16px;flex-shrink:0;">🔍</button>
        </div>
      </div>

      <!-- School Preview -->
      <div class="school-preview" id="schoolPreview">
        <div class="sp-name" id="spName">—</div>
        <div class="sp-meta" id="spMeta">—</div>
      </div>

      <!-- Role Selector -->
      <div style="font-size:0.72rem;color:var(--acadex-gray-500);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.75rem;">Select Your Role</div>
      <div class="role-grid" id="roleGrid">
        <div class="role-opt selected" onclick="selectRole(this,'admin')" data-role="admin">
          <div class="role-opt-icon">🏛️</div>
          <div class="role-opt-name">Admin</div>
        </div>
        <div class="role-opt" onclick="selectRole(this,'teacher')" data-role="teacher">
          <div class="role-opt-icon">👩‍🏫</div>
          <div class="role-opt-name">Teacher</div>
        </div>
        <div class="role-opt" onclick="selectRole(this,'student')" data-role="student">
          <div class="role-opt-icon">🎒</div>
          <div class="role-opt-name">Student</div>
        </div>
        <div class="role-opt" onclick="selectRole(this,'bursar')" data-role="bursar">
          <div class="role-opt-icon">💼</div>
          <div class="role-opt-name">Bursar</div>
        </div>
        <div class="role-opt" onclick="selectRole(this,'library')" data-role="library">
          <div class="role-opt-icon">📚</div>
          <div class="role-opt-name">Librarian</div>
        </div>
        <div class="role-opt" onclick="selectRole(this,'parent')" data-role="parent">
          <div class="role-opt-icon">👨‍👩‍👧</div>
          <div class="role-opt-name">Parent</div>
        </div>
        <div class="role-opt" onclick="selectRole(this,'alumni')" data-role="alumni">
          <div class="role-opt-icon">🎓</div>
          <div class="role-opt-name">Alumni</div>
        </div>
        <div class="role-opt" onclick="selectRole(this,'ancillary')" data-role="ancillary">
          <div class="role-opt-icon">🔧</div>
          <div class="role-opt-name">Ancillary</div>
        </div>
        <div class="role-opt" onclick="selectRole(this,'supplier')" data-role="supplier">
          <div class="role-opt-icon">🏪</div>
          <div class="role-opt-name">Supplier</div>
        </div>
      </div>

      <button class="btn btn-primary btn-full btn-lg" onclick="goToPortal()" id="loginBtn" style="margin-top:0.5rem;">Enter School Portal →</button>

      <div class="or-divider">or</div>

      <div style="text-align:center;">
        <a href="onboard.html" style="font-size:0.875rem;color:var(--acadex-gray-400);">
          New school? <strong style="color:var(--acadex-blue-light);">Register here →</strong>
        </a>
      </div>

      <div style="margin-top:1.25rem;text-align:center;font-size:0.78rem;color:var(--acadex-gray-600);">
        ACADEX Super Admin? <a href="super-admin/dashboard.html" style="color:var(--acadex-blue-light);">Go to Super Admin →</a>
      </div>
    </div>
  </div>
</div>

<script src="js/acadex-core.js"></script>
<script src="js/acadex-subscription.js"></script>
<script src="js/acadex-tenant.js"></script>
<script>
  let selectedRole = 'admin';
  let foundSchool = null;
  let lookupTimer = null;

  function selectRole(el, role) {
    document.querySelectorAll('.role-opt').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    selectedRole = role;
  }

  function lookupSchool() {
    clearTimeout(lookupTimer);
    lookupTimer = setTimeout(() => {
      const code = document.getElementById('schoolCodeInput').value.trim();
      if (code.length < 5) { hidePreview(); return; }
      const school = AcadexCore.getSchoolByCode(code);
      if (school) {
        foundSchool = school;
        AcadexCore.setActiveSchool(code);
        showPreview(school);
      } else {
        foundSchool = null;
        hidePreview();
      }
    }, 400);
  }

  function showPreview(school) {
    const plan = (window.ACADEX_PLANS || {})[school.plan] || {};
    document.getElementById('spName').textContent = school.name;
    document.getElementById('spMeta').textContent = `${school.type} · ${school.country} · ${plan.name || school.plan} Plan`;
    document.getElementById('schoolPreview').classList.add('show');
  }

  function hidePreview() {
    document.getElementById('schoolPreview').classList.remove('show');
  }

  function goToPortal() {
    const code = document.getElementById('schoolCodeInput').value.trim();
    if (!code) return alert('Please enter your school code.');
    const school = AcadexCore.getSchoolByCode(code);
    if (!school) return alert('School code not found. Please check and try again.');
    if (school.status === 'suspended') return alert('This school account is currently suspended. Contact ACADEX support.');

    AcadexCore.setActiveSchool(code);
    const url = AcadexSubscription.getPortalUrl(selectedRole, code);
    window.location.href = url;
  }

  // Pre-fill if school already active
  document.addEventListener('DOMContentLoaded', () => {
    const school = AcadexCore.getActiveSchool();
    if (school) {
      document.getElementById('schoolCodeInput').value = school.code;
      showPreview(school);
      foundSchool = school;
    }
  });
</script>
</body>
</html>
